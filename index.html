<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveBox - Seu Player de Música</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <main class="player-container">
            <header>
                <h2><i class="fas fa-headphones-alt"></i> GrooveBox</h2>
            </header>

            <div class="album-art">
                <div class="disc" id="disc"></div>
            </div>

            <div class="track-info">
                <h1 id="track-title">Nome da Música</h1>
                <p id="track-artist">Artista</p>
            </div>

            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="total-duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="prev" class="btn-secondary"><i class="fas fa-backward"></i></button>
                <button id="play" class="btn-main"><i class="fas fa-play"></i></button>
                <button id="next" class="btn-secondary"><i class="fas fa-forward"></i></button>
            </div>

            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.7">
                <i class="fas fa-volume-up"></i>
            </div>
        </main>

        <aside class="playlist-container">
            <h3>Sua Playlist</h3>
            <ul id="playlist">
                </ul>
        </aside>
    </div>

    <audio id="audio"></audio>

    <script src="script.js"></script>
</body>
</html>
